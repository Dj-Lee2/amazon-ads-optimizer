services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: amazon_optimizer
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:pass@postgres:5432/amazon_optimizer
      REDIS_URL: redis://redis:6379/0
      DATA_PROVIDER: mock
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  seed:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://postgres:pass@postgres:5432/amazon_optimizer
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: python seed.py
    profiles: ["seed"]

volumes:
  pgdata:
